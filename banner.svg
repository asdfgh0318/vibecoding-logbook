<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1a2a20"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="20%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="120" fill="url(#bg)"/>
  <rect y="90" width="1200" height="30" fill="url(#accent)"/>

  <!-- Decorative dots -->
  <circle cx="556" cy="34" r="1" fill="#22c55e" opacity="0.03"/>
<circle cx="912" cy="58" r="2" fill="#22c55e" opacity="0.04"/>
<circle cx="468" cy="82" r="3" fill="#22c55e" opacity="0.05"/>
<circle cx="824" cy="106" r="1" fill="#22c55e" opacity="0.06"/>
<circle cx="380" cy="30" r="2" fill="#22c55e" opacity="0.07"/>
<circle cx="736" cy="54" r="3" fill="#22c55e" opacity="0.03"/>
<circle cx="292" cy="78" r="1" fill="#22c55e" opacity="0.04"/>
<circle cx="648" cy="102" r="2" fill="#22c55e" opacity="0.05"/>
<circle cx="204" cy="26" r="3" fill="#22c55e" opacity="0.06"/>
<circle cx="560" cy="50" r="1" fill="#22c55e" opacity="0.07"/>
<circle cx="916" cy="74" r="2" fill="#22c55e" opacity="0.03"/>
<circle cx="472" cy="98" r="3" fill="#22c55e" opacity="0.04"/>


  <!-- Accent line -->
  <line x1="0" y1="118" x2="1200" y2="118" stroke="url(#line)" stroke-width="2"/>

  <!-- Icon -->
  <g color="#22c55e">
    <g transform="translate(80,30) scale(0.9)" opacity="0.12">
      <path d="M30,0 L0,10 L0,60 L30,50 L60,60 L60,10 Z" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <line x1="30" y1="0" x2="30" y2="50" stroke="currentColor" stroke-width="2"/>
      <line x1="8" y1="22" x2="25" y2="18" stroke="currentColor" stroke-width="1.5"/>
      <line x1="8" y1="32" x2="25" y2="28" stroke="currentColor" stroke-width="1.5"/>
      <line x1="35" y1="18" x2="52" y2="22" stroke="currentColor" stroke-width="1.5"/>
      <line x1="35" y1="28" x2="52" y2="32" stroke="currentColor" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="52" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="32" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="1">Vibecoding Logbook</text>

  <!-- Subtitle -->
  <text x="600" y="78" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">Project logbook and session notes</text>
</svg>